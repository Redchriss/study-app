name: Integration Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  integration-test:
    runs-on: macos-latest  # macOS has Android emulator hardware acceleration
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Create .env
        run: |
          echo "API_URL=https://yaza-ai-tutor.onrender.com" >> .env
          echo "GRAPHQL_URL=https://yaza-ai-tutor.onrender.com/graphql/" >> .env
          echo "FIREBASE_ENABLED=false" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests first
        run: flutter test test/widget_test.dart test/features test/core

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          script: >
            flutter test
            integration_test/flows/auth_flow_test.dart
            integration_test/flows/core_flow_test.dart
            --dart-define=YAZA_API_URL=https://yaza-ai-tutor.onrender.com
            -v
