name: Build and Release Flutter App

# Same idea as voxa_app: every push to main/master (and manual runs) builds and publishes a GitHub Release with APKs.
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/widget_test.dart test/features test/core --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Create key.properties
        run: |
          printf 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=release-keystore.jks\n' > android/key.properties

      - name: Clean build
        run: flutter clean

      - name: Build split APKs per ABI
        run: flutter build apk --split-per-abi --release --split-debug-info=./debug-info

      - name: Build universal APK
        run: flutter build apk --release --split-debug-info=./debug-info

      - name: List build outputs
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Yaza v1.0.${{ github.run_number }}
          body: |
            **APK downloads**
            - `app-arm64-v8a-release.apk` — most phones
            - `app-armeabi-v7a-release.apk` — older 32-bit phones
            - `app-x86_64-release.apk` — emulators
            - `app-release.apk` — universal (all devices, largest)

            Build: ${{ github.run_number }} · Commit: `${{ github.sha }}`
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
