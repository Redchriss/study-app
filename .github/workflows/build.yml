name: Build and Release Flutter App

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release'
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/widget_test.dart test/features test/core --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks

      - name: Create keystore properties
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          cat > android/keystore.properties << EOF
          storeFile=release-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Clean build
        run: flutter clean

      - name: Build split APKs per ABI
        run: flutter build apk --split-per-abi --release --obfuscate --split-debug-info=./debug-info

      - name: Build universal APK
        run: flutter build apk --release --obfuscate --split-debug-info=./debug-info

      - name: List build outputs
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Generate release tag
        id: tag
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release == true)
        run: |
          DATE_TAG="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          echo "tag=$DATE_TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release == true)
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Yaza ${{ steps.tag.outputs.tag }}"
          body: |
            ## Yaza Mobile Release
            
            - Build: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            
            ### Downloads
            Choose the file for your device:
            - **arm64-v8a** (most modern phones: Samsung A series, etc.)
            - **armeabi-v7a** (older phones)
            - **x86_64** (tablets, emulators)
            - **universal** (works everywhere, larger file)
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
