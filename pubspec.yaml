name: studyapp
description: Yaza — AI study companion for Malawian students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # GraphQL
  graphql_flutter: ^5.2.1

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.0
  flutter_secure_storage: ^9.2.2

  # Network
  connectivity_plus: ^6.0.5

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0

  # Biometric auth
  local_auth: ^2.3.0

  # TTS
  flutter_tts: ^4.2.5

  # Media
  image_picker: ^1.2.2
  camera: ^0.11.0+2
  flutter_pdfview: ^1.4.4
  file_picker: ^10.3.10
  flutter_markdown: ^0.7.4

  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_messaging: ^16.2.2

  # Utils
  intl: ^0.20.2
  share_plus: ^10.0.4
  url_launcher: ^6.3.1
  http: ^1.2.2
  path_provider: ^2.1.5
  flutter_dotenv: ^5.1.0
  # 9.10.0+ required for Kotlin 2.2+ (8.x pinned Kotlin language 1.6 → compile failure)
  sentry_flutter: ^9.10.0
  firebase_analytics: ^12.3.0
  firebase_core: ^4.7.0
  youtube_player_iframe: ^5.2.2
  genui: ^0.9.0
  json_schema_builder: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
