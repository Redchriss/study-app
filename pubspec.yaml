name: studyapp
description: Yaza — AI study companion for Malawian students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # GraphQL
  graphql_flutter: ^5.2.0-beta.7

  # Local storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.0
  flutter_secure_storage: ^9.2.2

  # Network
  connectivity_plus: ^6.0.5

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0

  # TTS
  flutter_tts: ^4.1.0

  # Media
  image_picker: ^1.1.3
  flutter_pdfview: ^1.3.2

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  http: ^1.2.2
  path_provider: ^2.1.5
  flutter_dotenv: ^5.1.0
  sentry_flutter: ^8.10.0
  firebase_analytics: ^11.3.0
  firebase_core: ^3.6.0
  youtube_player_iframe: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - .env
